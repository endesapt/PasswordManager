name: Firebase Test Lab

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - development/cicd

permissions:
  contents: read

concurrency:
  group: firebase-test-lab-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check required secrets
        id: secrets_check
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: |
          if [ -n "$GCP_PROJECT_ID" ] && [ -n "$GCP_SERVICE_ACCOUNT_KEY" ]; then
            echo "has_secrets=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_secrets=false" >> "$GITHUB_OUTPUT"
            echo "Firebase secrets are missing. Skipping Firebase Test Lab run."
          fi

      - name: Set up JDK 17
        if: ${{ steps.secrets_check.outputs.has_secrets == 'true' }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Authenticate to Google Cloud
        if: ${{ steps.secrets_check.outputs.has_secrets == 'true' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up gcloud
        if: ${{ steps.secrets_check.outputs.has_secrets == 'true' }}
        uses: google-github-actions/setup-gcloud@v2

      - name: Build app and androidTest APKs
        if: ${{ steps.secrets_check.outputs.has_secrets == 'true' }}
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug assembleDebugAndroidTest

      - name: Run instrumentation tests in Firebase Test Lab
        if: ${{ steps.secrets_check.outputs.has_secrets == 'true' }}
        run: |
          gcloud firebase test android run \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --type instrumentation \
            --app app/build/outputs/apk/debug/app-debug.apk \
            --test app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk \
            --device model=MediumPhone.arm,version=34,locale=en,orientation=portrait \
            --timeout 15m
